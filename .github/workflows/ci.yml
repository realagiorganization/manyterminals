name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: pytest -q

  ui-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install demo dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd
          curl -fsSL https://github.com/charmbracelet/vhs/releases/download/v0.11.0/vhs_0.11.0_Linux_x86_64.tar.gz -o /tmp/vhs.tar.gz
          tar -xzf /tmp/vhs.tar.gz -C /tmp
          sudo install /tmp/vhs_0.11.0_Linux_x86_64/vhs /usr/local/bin/vhs

      - name: Render terminal demo
        run: vhs demos/ui-demo.tape

      - name: Upload terminal demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-demo
          path: docs/ui-demo.gif
          if-no-files-found: error
